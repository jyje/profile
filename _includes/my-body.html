{% comment %}
<!--
Example code for using Matamo as alternative analytics solution.
-->
{% if site.matomo_analytics %}
<script>
  var _paq = _paq || [];

  {% if site.matomo_analytics.no_cookies %}
  _paq.push(['disableCookies']);
  {% endif %}

  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  _paq.push(['setTrackerUrl', u+'piwik.php']);
  _paq.push(['setSiteId', '{{site.matomo_analytics.site_id}}']);

  var pushStateEl = document.getElementById('_pushState');
  var timeStartLoadPage, referer, timeItTookToLoadPage;

  pushStateEl.addEventListener('hy-push-state-start', function() {
    timeStartLoadPage = new Date().getTime();
    referer = window.location.toString();
  });

  pushStateEl.addEventListener('hy-push-state-ready', function() {
    timeItTookToLoadPage = new Date().getTime() - timeStartLoadPage;
  });

  pushStateEl.addEventListener('hy-push-state-after', function() {
    _paq.push(['setReferrerUrl', referer]);
    _paq.push(['setCustomUrl', window.location.toString()]);
    _paq.push(['setDocumentTitle', document.title]);
    _paq.push(['deleteCustomVariables', 'page']);
    _paq.push(['setGenerationTimeMs', timeItTookToLoadPage]);
    _paq.push(['trackPageView']);
  });

  window.loadJSDeferred('{{site.matomo_analytics.root}}piwik.js');
</script>
{% endif %}
{% endcomment %}

<!-- Language switching and sidebar updates -->
<script>
(function() {
  /* Function to convert URL between languages (ko <-> en) */
  function switchLanguageUrl(url, targetLang) {
    var pathname = url;
    if (typeof url === 'string' && url.indexOf('://') !== -1) {
      var urlObj = new URL(url);
      pathname = urlObj.pathname;
    }
    
    // Normalize trailing slash or index.html for comparisons
    var cleanPath = pathname;
    if (cleanPath.endsWith('/index.html')) {
      cleanPath = cleanPath.slice(0, -10);
    }
    
    if (targetLang === 'ko') {
      if (cleanPath === '/en/' || cleanPath === '/en') {
        return '/';
      }
      if (cleanPath.indexOf('/en/') === 0) {
        return pathname.replace('/en/', '/ko/');
      }
      if (cleanPath.indexOf('/ko/') === 0 || cleanPath === '/') {
        return pathname;
      }
      return '/ko' + (pathname.startsWith('/') ? pathname : '/' + pathname);
    } else {
      if (cleanPath === '/' || cleanPath === '/ko/' || cleanPath === '/ko') {
        return '/en/';
      }
      if (cleanPath.indexOf('/ko/') === 0) {
        return pathname.replace('/ko/', '/en/');
      }
      if (cleanPath.indexOf('/en/') === 0) {
        return pathname;
      }
      return '/en' + (pathname.startsWith('/') ? pathname : '/' + pathname);
    }
  }


  /* Setup top navbar language switch button (single toggle: en <-> ko) */
  var navbarLangSwitchInitialized = false;
  function setupNavbarLangSwitch() {
    var langSwitchEl = document.getElementById('_lang-switch');
    if (!langSwitchEl) return;

    var currentPath = window.location.pathname;
    var isKo = !(currentPath.indexOf('/en/') === 0 || currentPath === '/en' || currentPath === '/en/');
    var targetLang = isKo ? 'en' : 'ko';
    var targetUrl = switchLanguageUrl(currentPath, targetLang);

    langSwitchEl.href = targetUrl;
    langSwitchEl.title = targetLang === 'ko' ? '한국어' : 'English';

    if (!navbarLangSwitchInitialized) {
      navbarLangSwitchInitialized = true;
      langSwitchEl.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = langSwitchEl.href;
      });
    }
  }

  /* Update language switch links after page navigation */
  var pushStateEl = document.getElementById('_pushState');
  if (pushStateEl) {
    pushStateEl.addEventListener('hy-push-state-after', function() {
      setupNavbarLangSwitch();
    });
  }

  /* Initial setup */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      setupNavbarLangSwitch();
    });
  } else {
    setupNavbarLangSwitch();
  }
})();
</script>
