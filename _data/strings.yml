# Strings
# =======================================================================================
# This file contains all soft-coded strings of the theme.
# You can edit them here if you want to change the wording of certain phrases,
# e.g. maybe you prefer "Fetching…" to "Loading…", etc.
#
# You can also use this to "translate" the theme into different langauges,
# but note that this may not work in all situations,
# especially for languages that differ significantly from English.

# Multilingual Site Info
# ---------------------------------------------------------------------------------------
site:
  en:
    full_title:          "jyje - Jeayoung Jeon"
    tagline:             "AI Platform Engineer"
    description: >
      I'm a software engineer majoring in LLMOps, Computer Vision and Cloud-Native Software Engineering.
      I'm currently working at Hyundai Autoever as an AI Platform Engineer.
  ko:
    full_title:          "jyje - Jeayoung Jeon"
    tagline:             "AI Platform Engineer"
    description: >
      LLMOps, 컴퓨터 비전 및 클라우드 네이티브 소프트웨어 엔지니어링을 전공하는 소프트웨어 엔지니어입니다.
      현재 현대오토에버에서 AI 플랫폼 엔지니어로 근무하고 있습니다.

